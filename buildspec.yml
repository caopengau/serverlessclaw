version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 24
    commands:
      - npm install -g pnpm
      - echo "Installing dependencies and Playwright in parallel..."
      - (pnpm install) &
      - PNPM_PID=$!
      - (npx playwright install --with-deps chromium) &
      - PW_PID=$!
      - wait $PNPM_PID && wait $PW_PID
  pre_build:
    commands:
      - |
        if [ "$EMERGENCY_ROLLBACK" = "true" ]; then
          echo "EMERGENCY ROLLBACK INITIATED"
          git config --global user.email "agent@serverlessclaw.local"
          git config --global user.name "Emergency Agent"
          if [ -n "$LKG_HASH" ]; then
            echo "Reverting to Last Known Good (LKG) state: $LKG_HASH"
            git fetch origin main --depth=50
            git checkout $LKG_HASH
          else
            echo "No LKG_HASH found. Reverting last commit (HEAD^)..."
            git revert HEAD --no-edit
          fi
        fi
      - |
        if [ -n "$STAGING_BUCKET_NAME" ]; then
          echo "Checking for staged changes in S3: $STAGING_BUCKET_NAME"
          aws s3 cp s3://$STAGING_BUCKET_NAME/staged_changes.zip staged_changes.zip || echo "No staged changes found."
          if [ -f "staged_changes.zip" ]; then
            echo "Applying staged changes..."
            unzip -o staged_changes.zip
            rm staged_changes.zip
          fi
        fi
  build:
    commands:
      - echo "Starting autonomous deployment and quality gate (Tier 1) in parallel..."
      - make gate-deploy &
      - GATE_PID=$!
      - make deploy ENV=$SST_STAGE
      - DEPLOY_EXIT=$?
      - wait $GATE_PID
      - GATE_EXIT=$?
      - |
        if [ $DEPLOY_EXIT -ne 0 ] || [ $GATE_EXIT -ne 0 ]; then
          echo "Build failed: Deploy Exit=$DEPLOY_EXIT, Gate Exit=$GATE_EXIT"
          exit 1
        fi
  post_build:
    commands:
      - |
        if [ "$EMERGENCY_ROLLBACK" = "true" ]; then
          echo "Verifying emergency recovery..."
          make verify || (echo "EMERGENCY RECOVERY VERIFICATION FAILED" && exit 1)
        fi
      - echo build completed on `date`
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ]; then
          echo "Deployment successful. Running post-deploy checks..."
          API_URL=$(python3 -c "import json; print(json.load(open('.sst/outputs.json'))['apiUrl'])")

          echo "Running Tier 3 verification (Health + E2E) in parallel..."
          make test-tier-3 URL=$API_URL

          if [ -n "$GITHUB_TOKEN" ]; then
            echo "Pushing changes back to GitHub..."
            git config --global user.email "agent@serverlessclaw.local"
            git config --global user.name "Claw Coder Agent"
            git add .
            if git commit -m "chore: autonomous improvement by Claw Coder Agent [skip ci]"; then
              git push https://$GITHUB_TOKEN@github.com/caopengau/serverlessclaw.git HEAD:main
            else
              echo "No changes to commit."
            fi
          fi
        fi
artifacts:
  files:
    - '**/*'
