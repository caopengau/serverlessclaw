name: Bug report
description: Create a report to help us improve
title: '[BUG] '
labels: ['bug', 'triage']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the issue...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: |
        How do we trigger this bug?
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
      placeholder: |
        1. 
        2. 
        3.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: What did you see?
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Screenshots/Recordings
      description: If applicable, add screenshots or recordings to help explain your problem.
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: |
        - OS: [e.g. macOS]
        - Browser: [e.g. Chrome]
        - Version: [e.g. 0.1.0]
        - Node Version: [e.g. 20.x]
      placeholder: Provide your environment details...
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Additional Checks
      options:
        - label: I have searched existing issues to ensure this bug hasn't been reported yet.
          required: true
        - label: I have checked the documentation and existing discussions.
          required: true
