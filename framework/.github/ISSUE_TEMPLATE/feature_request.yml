name: Feature request
description: Suggest an idea for this project
title: '[FEATURE] '
labels: ['enhancement', 'triage']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us make Serverless Claw better!
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        Is your feature request related to a problem?
        (e.g. I'm always frustrated when [...])
      placeholder: Describe the problem...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        A clear and concise description of what you want to happen.
        (e.g. Add a button to [...])
      placeholder: Describe the proposed solution...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: What else have you thought of?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
      placeholder: Any other details?
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Additional Checks
      options:
        - label: I have searched existing issues to ensure this feature hasn't been requested yet.
          required: true
        - label: I have checked the documentation and existing discussions.
          required: true
